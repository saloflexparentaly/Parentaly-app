<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parentelïa</title>
    <script>
      try {
        var m = JSON.parse(localStorage.getItem("parentelia-theme")) || "auto";
        var h = new Date().getHours();
        var t = m === "auto" ? (h >= 7 && h < 19 ? "light" : "dark") : m;
        document.documentElement.setAttribute("data-theme", t);
      } catch(e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
